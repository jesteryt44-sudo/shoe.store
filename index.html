<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShoeStore | Kategoriler</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #000; --accent: #ff4757; --bg-light: #f8f9fa; --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #fff; color: #1a1a1a; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 6%; background: white; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #eee;
        }
        .logo { font-size: 24px; font-weight: 800; cursor: pointer; }
        .logo span { color: var(--accent); }

        /* Kategori Filtreleme Barı */
        .filter-container {
            display: flex; justify-content: center; gap: 15px; padding: 20px 0;
            background: #fff; border-bottom: 1px solid #f0f0f0; overflow-x: auto;
            white-space: nowrap;
        }
        .filter-btn {
            padding: 10px 20px; border: 1px solid #ddd; border-radius: 30px;
            background: none; font-weight: 700; cursor: pointer; transition: 0.3s;
            font-size: 13px;
        }
        .filter-btn.active { background: #000; color: #fff; border-color: #000; }
        .filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

        .container { max-width: 1400px; margin: 0 auto; padding: 40px 5%; }
        .section { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; }
        .product-card { background: #fff; border-radius: 15px; border: 1px solid #eee; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        .img-wrapper { height: 260px; background: #f9f9f9; display: flex; align-items: center; justify-content: center; }
        .img-wrapper img { width: 85%; height: 85%; object-fit: contain; }
        .product-info { padding: 15px; }
        .product-cat { font-size: 11px; color: #aaa; font-weight: 800; text-transform: uppercase; }
        .product-title { font-size: 15px; font-weight: 700; margin: 5px 0; }
        .product-price { font-weight: 800; color: #000; }

        .cart-icon { position: relative; cursor: pointer; font-size: 20px; }
        .cart-badge { position: absolute; top: -8px; right: -10px; background: var(--accent); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; }

        /* Sepet Bölümü */
        .cart-layout { display: grid; grid-template-columns: 1fr 350px; gap: 40px; }
        .cart-item { display: flex; align-items: center; gap: 15px; padding: 15px; border-bottom: 1px solid #eee; }
        .cart-item img { width: 80px; height: 80px; object-fit: contain; background: #f5f5f5; border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="showPage('home-page')">SHOE<span>STORE.</span></div>
    <div class="cart-icon" onclick="showPage('cart-page')">
        <i class="fas fa-shopping-bag"></i>
        <span class="cart-badge" id="cart-count">0</span>
    </div>
</header>

<div class="filter-container" id="category-bar">
    <button class="filter-btn active" onclick="filterByCategory('Hepsi', this)">Hepsi</button>
    <button class="filter-btn" onclick="filterByCategory('Lifestyle', this)">Lifestyle</button>
    <button class="filter-btn" onclick="filterByCategory('Koşu', this)">Koşu</button>
    <button class="filter-btn" onclick="filterByCategory('Basketbol', this)">Basketbol</button>
    <button class="filter-btn" onclick="filterByCategory('Retro', this)">Retro</button>
</div>

<div class="container">
    <div id="home-page" class="section active">
        <h2 id="page-title" style="margin-bottom:30px;">Tüm Ürünler</h2>
        <div class="grid" id="main-grid"></div>
    </div>

    <div id="cart-page" class="section">
        <h2 style="margin-bottom:30px;">Sepetiniz</h2>
        <div class="cart-layout">
            <div id="cart-list"></div>
            <div style="background:#f9f9f9; padding:25px; border-radius:15px; height:fit-content;">
                <h3>Toplam: <span id="total-price">₺0</span></h3>
                <button style="width:100%; padding:15px; background:#000; color:#fff; border:none; border-radius:10px; margin-top:20px; font-weight:800; cursor:pointer;">ÖDEMEYE GEÇ</button>
            </div>
        </div>
    </div>
</div>

<script>
    const products = [
        {id: 1, name: "Alpha Edge 4D", cat: "Koşu", price: 8200, img: "https://images.unsplash.com/photo-1587563871167-1ee9c731aefb"},
        {id: 3, name: "Air Max Pulse", cat: "Lifestyle", price: 5400, img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff"},
        {id: 4, name: "NB 990v6", cat: "Lifestyle", price: 8800, img: "https://images.unsplash.com/photo-1539185441755-769473a23570"},
        {id: 5, name: "Ultraboost Light", cat: "Koşu", price: 6200, img: "https://images.unsplash.com/photo-1551107696-a4b0c5a0d9a2"},
        {id: 6, name: "Dunk Low Panda", cat: "Retro", price: 4200, img: "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519"},
        {id: 7, name: "Forum Low", cat: "Retro", price: 3600, img: "https://images.unsplash.com/photo-1511556532299-8f662fc26c06"},
        {id: 8, name: "Yeezy 350", cat: "Lifestyle", price: 12500, img: "https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77"},
        {id: 9, name: "Air Force 1", cat: "Lifestyle", price: 4400, img: "https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a"},
        {id: 10, name: "Club C 85", cat: "Retro", price: 2900, img: "https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa"},
        {id: 11, name: "Puma RS-X", cat: "Lifestyle", price: 3800, img: "https://images.unsplash.com/photo-1608231387042-66d1773070a5"},
        {id: 12, name: "Chuck 70", cat: "Retro", price: 3100, img: "https://images.unsplash.com/photo-1595341888016-a392ef81b7de"},
        {id: 13, name: "Vans Old Skool", cat: "Retro", price: 2400, img: "https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77"},
        {id: 14, name: "Pegasus 40", cat: "Koşu", price: 4800, img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff"},
        {id: 16, name: "Gel-Kayano", cat: "Koşu", price: 6900, img: "https://images.unsplash.com/photo-1514989940723-e8e51635b782"},
        {id: 17, name: "Blazer Mid", cat: "Retro", price: 3900, img: "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519"},
        {id: 18, name: "NB 530", cat: "Lifestyle", price: 4600, img: "https://images.unsplash.com/photo-1539185441755-769473a23570"},
        {id: 19, name: "Metcon 9", cat: "Koşu", price: 5100, img: "https://images.unsplash.com/photo-1587563871167-1ee9c731aefb"},
        {id: 20, name: "Superstar", cat: "Retro", price: 3400, img: "https://images.unsplash.com/photo-1511556532299-8f662fc26c06"}
    ];

    let cart = JSON.parse(localStorage.getItem('shoeStoreCart')) || [];

    function showPage(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('category-bar').style.display = (id === 'home-page') ? 'flex' : 'none';
        if(id === 'cart-page') renderCart();
        window.scrollTo(0,0);
    }

    function renderProducts(items) {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = items.map(p => `
            <div class="product-card" onclick="addToCart(${p.id})">
                <div class="img-wrapper"><img src="${p.img}"></div>
                <div class="product-info">
                    <div class="product-cat">${p.cat}</div>
                    <div class="product-title">${p.name}</div>
                    <div class="product-price">₺${p.price.toLocaleString('tr-TR')}</div>
                </div>
            </div>`).join('');
    }

    function filterByCategory(category, btn) {
        // Buton stilini güncelle
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Ürünleri filtrele
        const filtered = category === 'Hepsi' ? products : products.filter(p => p.cat === category);
        document.getElementById('page-title').innerText = category + " Koleksiyonu";
        renderProducts(filtered);
    }

    function addToCart(id) {
        const item = products.find(p => p.id === id);
        cart.push({...item, cartId: Date.now()});
        updateUI();
        alert(item.name + " sepete eklendi!");
    }

    function updateUI() {
        localStorage.setItem('shoeStoreCart', JSON.stringify(cart));
        document.getElementById('cart-count').innerText = cart.length;
    }

    function renderCart() {
        const list = document.getElementById('cart-list');
        const totalEl = document.getElementById('total-price');
        let total = 0;

        if(cart.length === 0) {
            list.innerHTML = "<p>Sepetiniz boş.</p>";
            totalEl.innerText = "₺0";
            return;
        }

        list.innerHTML = cart.map(item => {
            total += item.price;
            return `
                <div class="cart-item">
                    <img src="${item.img}">
                    <div style="flex:1">
                        <b>${item.name}</b><br>
                        <small>${item.cat}</small>
                    </div>
                    <b>₺${item.price.toLocaleString('tr-TR')}</b>
                    <i class="fas fa-trash" onclick="removeFromCart(${item.cartId})" style="cursor:pointer; margin-left:10px; color:#ddd"></i>
                </div>`;
        }).join('');
        totalEl.innerText = "₺" + total.toLocaleString('tr-TR');
    }

    function removeFromCart(cartId) {
        cart = cart.filter(i => i.cartId !== cartId);
        updateUI();
        renderCart();
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderProducts(products);
        updateUI();
    });
</script>

</body>
</html>
